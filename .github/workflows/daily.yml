name: Daily Stock Tracker

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate report
        run: npm run daily

      - name: Commit updated report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily stock tracker report"
          file_pattern: "data/latest-report.json docs/index.html docs/latest-report.json docs/.nojekyll"
